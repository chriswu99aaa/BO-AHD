_target_: utils.llm_client.openai.OpenAIClient

# Qwen3 模型配置
model: qwen-max # 可选：qwen-max, qwen-plus, qwen-turbo, qwen2.5-32b-instruct 等
temperature: 1.0
base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 阿里云百炼兼容模式API地址，与测试代码一致
api_key: "sk-32533940bb4044b390395659078c1972"  # 从环境变量读取API Key，或直接填写您的API Key

# 嵌入模型配置
embedding_model: "text-embedding-v4"  # Qwen3 嵌入模型，与测试代码一致
dimensions: 1536  # 指定向量维度（仅 text-embedding-v3 及 text-embedding-v4 支持），设置为与 OpenAI ada-002 兼容的 1536 维
# encoding_format: "float"  # 可选：编码格式，默认为 "float"，与测试代码一致

# 使用说明：
# 1. 设置环境变量：export DASHSCOPE_API_KEY="your-api-key"
# 2. 或者在 api_key 字段直接填写您的API Key
# 3. 如需使用特定维度，取消注释 dimensions 并设置所需值（如 1024, 1536 等）
# 4. 编码格式通常使用默认的 "float"，如需 base64 格式可修改 encoding_format

